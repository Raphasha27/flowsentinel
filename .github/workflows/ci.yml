name: Kirov .NET CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/FlowSentinel.UnitTests --no-build --configuration Release --verbosity normal

      - name: Run Integration Tests
        run: dotnet test tests/FlowSentinel.IntegrationTests --no-build --configuration Release --verbosity normal

      - name: Security Analysis (CodeQL)
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Auto-build for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
