name: .NET Core CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore FlowSentinel.sln
      
    - name: Build
      run: dotnet build FlowSentinel.sln --no-restore --configuration Release
      
    - name: Test
      run: dotnet test FlowSentinel.sln --no-build --configuration Release --verbosity normal
